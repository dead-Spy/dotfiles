general {
    disable_loading = true
    hide_cursor = true
}

background {
    monitor =
    path = /home/deadspy/Downloads/wallpaper.png
    blur_passes = 2
    color = rgba(25, 20, 20, 1.0)
}

input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    placeholder_text = <i>Input Password...</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(200, 200, 200, 1.0)
    font_size = 64
    font_family = Google Sans Flex
    position = 0, 80
    halign = center
    valign = center
}
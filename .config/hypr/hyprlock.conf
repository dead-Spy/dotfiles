$bg1 = rgba(40, 40, 40, 0.75)
$fg = rgb(235, 219, 178)
$yellow = rgb(215, 153, 33)
$blue = rgb(69, 133, 136)
$grey = rgb(146, 131, 116)

general {
    hide_cursor = true
}

background {
    monitor =
    path = /home/deadspy/Downloads/wall/ff.png
    blur_passes = 0
    blur_size = 0
}

animations {
    enabled = true
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    animation = fadeIn, 1, 8, easeOutExpo
}

label {
    monitor =
    text =   Arch Linux
    color = $yellow
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 65, 320
    halign = left
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%I:%M")"
    color = $fg
    font_size = 80
    font_family = Montserrat Bold
    position = 55, 210
    halign = left
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"
    color = $yellow
    font_size = 18
    font_family = Montserrat Light
    position = 65, 125
    halign = left
    valign = center
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = $blue
    inner_color = $bg1
    font_color = $fg
    fade_on_empty = true
    placeholder_text = <i>Enter Password</i>
    hide_input = false
    position = 65, 30
    halign = left
    valign = center
}
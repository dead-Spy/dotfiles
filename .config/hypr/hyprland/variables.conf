# Terminal
$terminal = kitty

# File Manager
$fileManager = thunar

# Browser
$browser = google-chrome-stable

# Editors
$codeEditor = code
$textEditor = mousepad

# Utilities
$volumeMixer = pavucontrol
$taskManager = kitty -e btop

# Configuration logic
$dontLoadDefaultExecs =
$dontLoadDefaultGeneral =
$dontLoadDefaultRules =
$dontLoadDefaultKeybinds =

# Decoration & Blur Settings
decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 0.9
    
    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = true
        brightness = 1.0
        contrast = 1.0
        noise = 0.01
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(1a1a1aee)
    }
}
# Terminal
$terminal = kitty

# File Manager
$fileManager = thunar

# Browser
$browser = google-chrome-stable

# Editors
$codeEditor = code
$textEditor = mousepad

# Utilities
$volumeMixer = pavucontrol
$taskManager = kitty -e btop

# Configuration logic
$dontLoadDefaultExecs =
$dontLoadDefaultGeneral =
$dontLoadDefaultRules =
$dontLoadDefaultKeybinds =

# Blur Variables (Matching your preferred heavy blur)
$blurEnabled = true
$blurSize = 12
$blurPasses = 4
$blurXray = true
$blurIgnoreOpacity = true
$blurNoise = 0.02
$blurBrightness = 0.8
$blurContrast = 1.2

# Decoration & Blur Settings (Maximum Deep Blur)
decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 0.9
    
    blur {
        enabled = true
        size = 20
        passes = 5
        new_optimizations = true
        ignore_opacity = true
        xray = false
        brightness = 0.5
        contrast = 1.6
        noise = 0.01
        vibrancy = 0.2
        vibrancy_darkness = 0.5
    }

    shadow {
        enabled = true
        range = 25
        render_power = 4
        color = rgba(00000099)
    }
}